name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs when new commits land on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (lint + typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version is read from the root package.json's `packageManager` field —
      # don't pass `version:` here or the action errors out with
      # ERR_PNPM_BAD_PM_VERSION on conflict.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm build
